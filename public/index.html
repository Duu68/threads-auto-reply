<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads Auto Reply</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .hero { text-align: center; padding: 40px 20px; }
  .logo { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 36px; font-weight: 700; margin-bottom: 12px; }
  p { color: #888; font-size: 18px; margin-bottom: 40px; }
  .btn { display: inline-block; background: #fff; color: #000; padding: 16px 40px; border-radius: 50px; font-size: 16px; font-weight: 600; text-decoration: none; transition: opacity .2s; }
  .btn:hover { opacity: 0.85; }
  .error { color: #ff4444; margin-top: 20px; font-size: 14px; }
</style>
</head>
<body>
<div class="hero">
  <div class="logo">🧵</div>
  <h1>Threads Auto Reply</h1>
  <p>設定關鍵詞，自動回覆 Threads 留言</p>
  <a href="/auth/login" class="btn">連結 Threads 帳號</a>
  <div id="error"></div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  if (params.get('error')) {
    document.getElementById('error').textContent = '授權失敗，請重試';
  }
</script>
</body>
</html>
